<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supabase Test</title>
<!-- Correct UMD script for browsers -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/supabase.min.js"></script>
</head>
<body>
<h1>Supabase Test</h1>
<button id="testBtn">Test Supabase</button>

<script>
document.addEventListener("DOMContentLoaded", () => {
  console.log("Supabase object:", supabase); // should log the supabase object

  // Initialize Supabase client
  const SUPABASE_URL = "https://asjgeewdjzuxiwpwsgdo.supabase.co";
  const SUPABASE_KEY = "sb_publishable_t85VjLn4nhxpXkm3w_d-Aw_cIt7bN-p";
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // Simple test: list all posts from Supabase
  document.getElementById("testBtn").addEventListener("click", async () => {
    const { data, error } = await supabaseClient.from('posts').select('*');
    if(error) {
      console.error("Error fetching posts:", error);
      alert("Error fetching posts — check console");
    } else {
      console.log("Posts:", data);
      alert("Posts fetched! See console.");
    }
  });
});
</script>
</body>
</html>
