<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cardiff Pulse</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; padding: 0; }
  header { background: #2a2a72; color: white; padding: 1rem; text-align: center; }
  #posts { max-width: 600px; margin: 2rem auto; }
  .post { background: #eee; padding: 1rem; margin-bottom: 1rem; border-radius: 6px; }
  #admin-panel { display: none; max-width: 600px; margin: 2rem auto; padding: 1rem; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
  input, textarea { width: 100%; padding: 0.5rem; margin: 0.5rem 0; }
  button { padding: 0.5rem 1rem; margin-top: 0.5rem; cursor: pointer; }
</style>
</head>
<body>

<header>
  <h1>Cardiff Pulse</h1>
</header>

<div id="posts"></div>

<div id="admin-panel">
  <h3>Admin Panel</h3>
  <input type="text" id="post-title" placeholder="Post Title">
  <textarea id="post-content" placeholder="Post Content"></textarea>
  <button onclick="addPost()">Add Post</button>
  <button onclick="hideAdmin()">Close Admin</button>
</div>

<script>
  // --- Supabase setup ---
  const SUPABASE_URL = 'https://asjgeewdjzuxiwpwsgdo.supabase.co';
  const SUPABASE_KEY = 'sb_secret_Uq1_HuAcQNppRuu0kwO0Pg_znqfjyjV';
  const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // --- Hidden admin password ---
  const ADMIN_PASSWORD = 'yourSecret123'; // change this

  // --- Show admin panel if password correct ---
  function promptAdmin() {
    const pass = prompt("Enter admin password:");
    if(pass === ADMIN_PASSWORD){
      document.getElementById('admin-panel').style.display = 'block';
      alert('Admin panel unlocked!');
    } else {
      alert('Wrong password!');
    }
  }

  function hideAdmin() {
    document.getElementById('admin-panel').style.display = 'none';
  }

  // --- Posts ---
  async function fetchPosts() {
    const { data, error } = await supabase.from('posts').select('*').order('id', { ascending: false });
    const postsDiv = document.getElementById('posts');
    postsDiv.innerHTML = '';
    data.forEach(post => {
      const div = document.createElement('div');
      div.className = 'post';
      div.innerHTML = `<h4>${post.title}</h4><p>${post.content}</p>`;
      postsDiv.appendChild(div);
    });
  }

  async function addPost() {
    const title = document.getElementById('post-title').value;
    const content = document.getElementById('post-content').value;
    if(!title || !content) return alert("Title and content required!");
    const { data, error } = await supabase.from('posts').insert([{ title, content }]);
    if(error) alert(error.message);
    else {
      document.getElementById('post-title').value = '';
      document.getElementById('post-content').value = '';
      fetchPosts();
    }
  }

  // --- Initialize ---
  fetchPosts();

  // --- Secret admin trigger: double-click header ---
  document.querySelector('header').addEventListener('dblclick', promptAdmin);
</script>

</body>
</html>
